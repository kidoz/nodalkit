# Meson cross file: 32-bit (i686) Windows using clang targeting the MSVC ABI.
#
# Requires a 32-bit Windows SDK / CRT in the environment (INCLUDE / LIB), e.g.
# via `ilammy/msvc-dev-cmd` with `arch: x86` in CI, or a "x86 Native Tools"
# developer prompt locally. clang resolves the SDK from those variables; only
# the target triple has to be pinned here.

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'

[built-in options]
c_args = ['--target=i686-pc-windows-msvc']
cpp_args = ['--target=i686-pc-windows-msvc']
c_link_args = ['--target=i686-pc-windows-msvc']
cpp_link_args = ['--target=i686-pc-windows-msvc']

[host_machine]
system = 'windows'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'
